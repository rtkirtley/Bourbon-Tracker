<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bourbon Vault Ultimate Free</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:white;padding:15px}
h1{text-align:center;color:#d4a24c;margin-bottom:20px}
.card{background:#1c1c1c;padding:15px;border-radius:14px;margin-bottom:20px}
input,textarea,select{width:100%;padding:10px;margin-top:6px;margin-bottom:10px;border-radius:8px;border:none;background:#2c2c2c;color:white}
input[type=range]{width:100%}
button{width:100%;padding:12px;border-radius:10px;border:none;background:#d4a24c;color:black;font-weight:bold;margin-top:8px}
.bourbon{background:#1a1a1a;padding:12px;border-radius:12px;margin-bottom:12px}
.rank{font-size:18px;font-weight:bold;color:#d4a24c}
.score{font-size:16px;margin-bottom:6px}
.img-preview{width:100%;max-height:200px;object-fit:contain;margin-bottom:8px;border-radius:8px}
.search{margin-bottom:15px;padding:8px;border-radius:8px;border:none;background:#2c2c2c;color:white}
.autocomplete-suggestions{background:#2c2c2c;border-radius:8px;margin-top:-5px;max-height:150px;overflow-y:auto}
.suggestion{padding:10px;border-bottom:1px solid #444;cursor:pointer}
.suggestion:hover{background:#3a3a3a}
.chart-container{background:#1c1c1c;padding:10px;border-radius:12px;margin-top:12px}
</style>
</head>
<body>

<h1>🥃 Bourbon Vault Ultimate Free</h1>

<div class="card">
<input id="webSearch" class="search" placeholder="Search for a bourbon...">
<div id="suggestions" class="autocomplete-suggestions"></div>

<input id="name" placeholder="Bourbon Name">
<input id="distillery" placeholder="Distillery (auto or manual)">
<input id="score" type="number" placeholder="Overall Score 1-10" min="1" max="10">

<label>Sweet <span id="sweetVal">3</span></label>
<input type="range" id="sweet" min="1" max="5" value="3" oninput="sweetVal.innerText=this.value">
<label>Oak <span id="oakVal">3</span></label>
<input type="range" id="oak" min="1" max="5" value="3" oninput="oakVal.innerText=this.value">
<label>Spice <span id="spiceVal">3</span></label>
<input type="range" id="spice" min="1" max="5" value="3" oninput="spiceVal.innerText=this.value">
<label>Heat <span id="heatVal">3</span></label>
<input type="range" id="heat" min="1" max="5" value="3" oninput="heatVal.innerText=this.value">
<label>Complexity <span id="complexityVal">3</span></label>
<input type="range" id="complexity" min="1" max="5" value="3" oninput="complexityVal.innerText=this.value">

<textarea id="notes" placeholder="Tasting Notes"></textarea>
<button onclick="addBourbon()">Add Bourbon</button>
</div>

<input class="search" id="search" placeholder="Search your logged bourbons..." oninput="render()">

<h2>🏆 Leaderboard</h2>
<div id="list"></div>

<h2>📊 Flavor Radar</h2>
<canvas id="radarChart" class="chart-container"></canvas>

<script>
// --- Data Store ---
let bourbons = JSON.parse(localStorage.getItem("bourbons") || "[]")
function save(){localStorage.setItem("bourbons", JSON.stringify(bourbons))}

// --- Add Bourbon ---
function addBourbon(){
    const imgData = document.getElementById("imagePreview") ? document.getElementById("imagePreview").src : null
    const b = {
        name:name.value,
        distillery:distillery.value,
        score:Number(score.value),
        sweet:Number(sweet.value),
        oak:Number(oak.value),
        spice:Number(spice.value),
        heat:Number(heat.value),
        complexity:Number(complexity.value),
        notes:notes.value,
        img:imgData
    }
    bourbons.push(b)
    bourbons.sort((a,b)=>b.score-a.score)
    save()
    render()
    document.querySelectorAll("input,textarea").forEach(el=>{el.value=""})
    sweet.value=oak.value=spice.value=heat.value=complexity.value=3
    sweetVal.innerText=oakVal.innerText=spiceVal.innerText=heatVal.innerText=complexityVal.innerText=3
    if(document.getElementById("imagePreview")) document.getElementById("imagePreview").remove()
}

// --- Delete ---
function deleteBourbon(i){if(confirm("Delete this bourbon?")){bourbons.splice(i,1);save();render()}}

// --- Render ---
function render(){
    const searchTerm = search.value.toLowerCase()
    let html=""
    bourbons.filter(b=>b.name.toLowerCase().includes(searchTerm)).forEach((b,i)=>{
        html+=`<div class="bourbon">
        <div class="rank">#${i+1} ${b.name}</div>
        <div>${b.distillery}</div>
        <div class="score">⭐ ${b.score}/10</div>
        <div>Sweet:${b.sweet} Oak:${b.oak} Spice:${b.spice} Heat:${b.heat} Complexity:${b.complexity}</div>
        ${b.img?`<img src="${b.img}" class="img-preview">`:''}
        <div>${b.notes}</div>
        <button onclick="deleteBourbon(${i})">Delete</button>
        </div>`
    })
    list.innerHTML=html
    updateRadar()
}
render()

// --- Radar Chart ---
let radarChart = new Chart(document.getElementById('radarChart'),{
    type:'radar',
    data:{
        labels:['Sweet','Oak','Spice','Heat','Complexity'],
        datasets:[]
    },
    options:{
        scales:{r:{min:0,max:5,ticks:{stepSize:1}}},
        plugins:{legend:{display:true,labels:{color:'white'}}},
    }
})
function updateRadar(){
    radarChart.data.datasets = bourbons.slice(0,5).map((b,i)=>({
        label:`#${i+1} ${b.name}`,
        data:[b.sweet,b.oak,b.spice,b.heat,b.complexity],
        fill:true,
        backgroundColor:'rgba(212,162,76,0.2)',
        borderColor:'#d4a24c',
        pointBackgroundColor:'#d4a24c'
    }))
    radarChart.update()
}

// --- Free Google Image Search ---
const suggestionsDiv = document.getElementById("suggestions")
webSearch.addEventListener("input", async function(){
    const query = webSearch.value
    if(query.length<2){suggestionsDiv.innerHTML=""; return}
    // Use Google Images search URL for suggestions (CORS safe version)
    const searchURL = `https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(query + " bourbon bottle")}&searchType=image&num=5&key=YOUR_KEY&cx=YOUR_CX`
    // Placeholder mock images (no API key needed)
    const mockResults=[
        {name:"Buffalo Trace",distillery:"Buffalo Trace Distillery",img:"https://upload.wikimedia.org/wikipedia/commons/3/31/Buffalo_Trace_bottle.jpg"},
        {name:"Woodford Reserve",distillery:"Brown-Forman",img:"https://upload.wikimedia.org/wikipedia/commons/e/e3/Woodford_Reserve_bottle.jpg"},
        {name:"Four Roses Single Barrel",distillery:"Four Roses",img:"https://upload.wikimedia.org/wikipedia/commons/4/4b/Four_Roses_Single_Barrel_bottle.jpg"}
    ].filter(r=>r.name.toLowerCase().includes(query.toLowerCase()))
    suggestionsDiv.innerHTML = mockResults.map(r=>`<div class="suggestion" onclick="selectBourbon('${r.name}','${r.distillery}','${r.img}')"><img src="${r.img}" style="height:40px;vertical-align:middle;margin-right:8px">${r.name} - ${r.distillery}</div>`).join("")
})
function selectBourbon(nameVal,distilleryVal,imgVal){
    name.value=nameVal
    distillery.value=distilleryVal
    let prevImg = document.getElementById("imagePreview")
    if(prevImg) prevImg.remove()
    let img = document.createElement("img")
    img.src = imgVal
    img.id="imagePreview"
    img.className="img-preview"
    document.querySelector(".card").insertBefore(img, document.querySelector("#notes"))
    suggestionsDiv.innerHTML=""
}
</script>
</body>
</html>
