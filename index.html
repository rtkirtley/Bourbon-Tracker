<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bourbon Vault Ultimate</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:-apple-system,sans-serif; margin:0; padding:0; background:#121212; color:white;}
h1 { text-align:center; color:#d4a24c; margin:20px 0; font-size:1.6em;}
.tab-menu { display:flex; justify-content:space-around; background:#1f1f1f; }
.tab-menu button { flex:1; padding:12px; font-weight:bold; border:none; background:none; color:white; cursor:pointer; transition:0.2s; }
.tab-menu button.active { background:#d4a24c; color:black; border-radius:8px; }
.tab-content { padding:15px; display:none; }
.tab-content.active { display:block; }
.card { background:#1c1c1c; border-radius:14px; padding:15px; margin-bottom:20px; }
input, textarea, select { width:100%; padding:10px; margin:6px 0 12px; border-radius:8px; border:none; background:#2c2c2c; color:white; }
input[type=range]{width:100%;}
button{width:100%;padding:12px;border-radius:10px;border:none;background:#d4a24c;color:black;font-weight:bold;margin-top:8px;cursor:pointer;transition:0.2s;}
button:hover{background:#c39a4f;}
.bourbon-card { background:#1a1a1a; padding:12px; border-radius:12px; margin-bottom:12px; }
.bourbon-card img { width:100%; max-height:180px; object-fit:contain; border-radius:8px; margin-bottom:6px; }
.search { margin-bottom:15px; padding:8px; border-radius:8px; border:none; background:#2c2c2c; color:white; }
.autocomplete-suggestions { background:#2c2c2c; border-radius:8px; max-height:200px; overflow-y:auto; position:absolute; z-index:1000; width:calc(100% - 30px); }
.autocomplete-suggestions div { padding:8px; cursor:pointer; }
.autocomplete-suggestions div:hover { background:#d4a24c; color:black; }
.chart-container { background:#1c1c1c; padding:10px; border-radius:12px; margin-top:12px; }
@media (max-width:500px){ h1{font-size:1.4em;} }
</style>
</head>
<body>

<h1>🥃 Bourbon Vault Ultimate</h1>

<div class="tab-menu">
  <button class="tab-btn active" data-tab="log">Log Bourbon</button>
  <button class="tab-btn" data-tab="collection">Collection</button>
  <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
  <button class="tab-btn" data-tab="analytics">Analytics</button>
</div>

<!-- Log Tab -->
<div class="tab-content active" id="log">
  <div class="card">
    <input id="bourbonName" placeholder="Bourbon Name" autocomplete="off">
    <div id="autocomplete-list" class="autocomplete-suggestions"></div>
    <input id="bourbonDistillery" placeholder="Distillery">
    <input id="bourbonProof" placeholder="Proof (optional)">
    <input id="bourbonScore" type="number" placeholder="Score 1-10" min="0" max="10">
    <label>Sweet <span id="sweetVal">3</span></label>
    <input type="range" id="sweet" min="1" max="5" value="3" oninput="sweetVal.innerText=this.value">
    <label>Oak <span id="oakVal">3</span></label>
    <input type="range" id="oak" min="1" max="5" value="3" oninput="oakVal.innerText=this.value">
    <label>Spice <span id="spiceVal">3</span></label>
    <input type="range" id="spice" min="1" max="5" value="3" oninput="spiceVal.innerText=this.value">
    <label>Heat <span id="heatVal">3</span></label>
    <input type="range" id="heat" min="1" max="5" value="3" oninput="heatVal.innerText=this.value">
    <label>Complexity <span id="complexityVal">3</span></label>
    <input type="range" id="complexity" min="1" max="5" value="3" oninput="complexityVal.innerText=this.value">
    <textarea id="bourbonNotes" placeholder="Tasting Notes"></textarea>
    <button onclick="addBourbon()">Add Bourbon</button>
  </div>
</div>

<!-- Collection Tab -->
<div class="tab-content" id="collection">
  <input class="search" id="search" placeholder="Search collection..." oninput="renderCollection()">
  <div id="collectionList"></div>
</div>

<!-- Leaderboard Tab -->
<div class="tab-content" id="leaderboard">
  <div id="leaderList"></div>
</div>

<!-- Analytics Tab -->
<div class="tab-content" id="analytics">
  <canvas id="radarChart" class="chart-container"></canvas>
</div>

<script>
// --- Tabs ---
const tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
}));

// --- AI-generated Bourbon Database (Expanded) ---
const bourbonNames = [
  "Buffalo Trace","Eagle Rare 10","Four Roses Single Barrel","Blanton's","Elijah Craig 12",
  "Woodford Reserve","Bulleit Bourbon","Knob Creek","Wild Turkey 101","Maker's Mark",
  "Noah's Mill","Parker's Heritage","Michter's","Old Forester","Stagg Jr","Weller Special Reserve",
  "Henry McKenna 10","Russell's Reserve 10","George T. Stagg","Four Roses Small Batch","Four Roses 100 Proof",
  "Old Rip Van Winkle 10","Old Rip Van Winkle 12","Van Winkle Special Reserve","Booker's","Colonel E.H. Taylor Small Batch",
  "Angel's Envy","1792 Ridgemont","Rebel Yell","Prichard's","Jefferson's","High West","Bardstown Bourbon","Belle Meade",
  "Smooth Ambler","Clyde May's","Whistlepig Rye","Balcones","Woodinville","Kings County","Old Forester 1897","Old Forester Birthday Bourbon",
  "Rittenhouse Rye","Redemption Rye","Breckenridge Bourbon","Templeton Rye","Garrison Brothers","Corsair","Belle Meade Sherry Cask",
  "Willett","Orphan Barrel","Stranahan's","Dad's Hat"
];
const bourbonDB = [];
for(let i=0;i<1000;i++){
    const name = bourbonNames[i % bourbonNames.length] + " #" + (i+1);
    bourbonDB.push({
        name:name,
        distillery:"Distillery " + ((i%50)+1),
        proof:80 + (i%21),
        score:Math.floor(Math.random()*10)+1,
        sweet:Math.floor(Math.random()*5)+1,
        oak:Math.floor(Math.random()*5)+1,
        spice:Math.floor(Math.random()*5)+1,
        heat:Math.floor(Math.random()*5)+1,
        complexity:Math.floor(Math.random()*5)+1
    });
}

// --- Data Store ---
let bourbons = JSON.parse(localStorage.getItem("bourbons") || "[]");
function save(){ localStorage.setItem("bourbons", JSON.stringify(bourbons)) }

// --- Wikipedia API Image Search ---
async function fetchBourbonImage(name){
    try {
        const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages&piprop=original&titles=${encodeURIComponent(name+' bourbon')}`;
        const res = await fetch(url);
        const data = await res.json();
        const pages = data.query.pages;
        const key = Object.keys(pages)[0];
        if(pages[key].original) return pages[key].original.source;
    } catch(e){ console.log("Wiki API error:", e) }
    return null;
}

// --- Autocomplete ---
const inputName = document.getElementById("bourbonName");
const autocompleteList = document.getElementById("autocomplete-list");
inputName.addEventListener("input", ()=>{
    const val = inputName.value.toLowerCase();
    autocompleteList.innerHTML = "";
    if(!val) return;
    const matches = bourbonDB.filter(b=>b.name.toLowerCase().includes(val)).slice(0,10);
    matches.forEach(b=>{
        const div = document.createElement("div");
        div.textContent = b.name;
        div.addEventListener("click", ()=>{
            inputName.value = b.name;
            document.getElementById("bourbonDistillery").value = b.distillery;
            document.getElementById("bourbonProof").value = b.proof;
            document.getElementById("bourbonScore").value = b.score;
            document.getElementById("sweet").value = b.sweet; sweetVal.innerText=b.sweet;
            document.getElementById("oak").value = b.oak; oakVal.innerText=b.oak;
            document.getElementById("spice").value = b.spice; spiceVal.innerText=b.spice;
            document.getElementById("heat").value = b.heat; heatVal.innerText=b.heat;
            document.getElementById("complexity").value = b.complexity; complexityVal.innerText=b.complexity;
            autocompleteList.innerHTML = "";
        });
        autocompleteList.appendChild(div);
    });
});

// --- Add Bourbon ---
async function addBourbon() {
    const nameEl = document.getElementById("bourbonName");
    const distEl = document.getElementById("bourbonDistillery");
    const proofEl = document.getElementById("bourbonProof");
    const scoreEl = document.getElementById("bourbonScore");
    const sweetEl = document.getElementById("sweet");
    const oakEl = document.getElementById("oak");
    const spiceEl = document.getElementById("spice");
    const heatEl = document.getElementById("heat");
    const complexityEl = document.getElementById("complexity");
    const notesEl = document.getElementById("bourbonNotes");

    const nameVal = nameEl.value.trim();
    if(!nameVal){ alert("Enter bourbon name"); return; }
    let distVal = distEl.value.trim(); if(!distVal) distVal=nameVal;

    const scoreVal = Number(scoreEl.value) || 0;

    let imgUrl = null;
    try { imgUrl = await fetchBourbonImage(nameVal); } catch(e){ console.log(e) }

    const bourbon = {
        name: nameVal,
        distillery: distVal,
        proof: proofEl.value,
        score: scoreVal,
        sweet: Number(sweetEl.value),
        oak: Number(oakEl.value),
        spice: Number(spiceEl.value),
        heat: Number(heatEl.value),
        complexity: Number(complexityEl.value),
        notes: notesEl.value,
        img: imgUrl
    };

    bourbons.push(bourbon);
    bourbons.sort((a,b) => b.score - a.score);
    save();
    renderCollection();
    renderLeaderboard();
    updateRadar();

    // Reset inputs
    [nameEl, distEl, proofEl, scoreEl, notesEl].forEach(i=>i.value="");
    [sweetEl, oakEl, spiceEl, heatEl, complexityEl].forEach(i=>i.value=3);
    ["sweetVal","oakVal","spiceVal","heatVal","complexityVal"].forEach(id=>document.getElementById(id).innerText=3);
}

// --- Delete ---
function deleteBourbon(i){ if(confirm("Delete this bourbon?")){ bourbons.splice(i,1); save(); renderCollection(); renderLeaderboard(); updateRadar() }}

// --- Render Collection ---
function renderCollection(){
    const term = document.getElementById("search").value.toLowerCase();
    let html="";
    bourbons.filter(b=>b.name.toLowerCase().includes(term)).forEach((b,i)=>{
        html+=`<div class="bourbon-card">
        <div><strong>${b.name}</strong> ${b.proof?'- '+b.proof+'°':''}</div>
        <div>${b.distillery}</div>
        <div>Score: ${b.score}/10</div>
        <div>Sweet:${b.sweet} Oak:${b.oak} Spice:${b.spice} Heat:${b.heat} Complexity:${b.complexity}</div>
        ${b.img?`<img src="${b.img}">`:''}
        <div>${b.notes}</div>
        <button onclick="deleteBourbon(${i})">Delete</button>
        </div>`;
    });
    document.getElementById("collectionList").innerHTML = html;
}
renderCollection();

// --- Leaderboard ---
function renderLeaderboard(){
    let html="";
    bourbons.sort((a,b)=>b.score-a.score).forEach((b,i)=>{
        html+=`<div class="bourbon-card">
        <div>#${i+1} ${b.name} - ${b.score}/10</div>
        </div>`;
    });
    document.getElementById("leaderList").innerHTML = html;
}
renderLeaderboard();

// --- Radar Chart ---
let radarChart = new Chart(document.getElementById('radarChart'),{
    type:'radar',
    data:{ labels:['Sweet','Oak','Spice','Heat','Complexity'], datasets:[] },
    options:{ scales:{r:{min:0,max:5,ticks:{stepSize:1}}}, plugins:{legend:{display:true,labels:{color:'white'}}}}
})
function updateRadar(){
    radarChart.data.datasets = bourbons.slice(0,5).map((b,i)=>({
        label:`#${i+1} ${b.name}`,
        data:[b.sweet,b.oak,b.spice,b.heat,b.complexity],
        fill:true,
        backgroundColor:'rgba(212,162,76,0.2)',
        borderColor:'#d4a24c',
        pointBackgroundColor:'#d4a24c'
    }));
    radarChart.update();
}
updateRadar();
</script>
</body>
</html>
