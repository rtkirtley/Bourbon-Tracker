<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bourbon Vault</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #d4a24c; --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; }
        body { font-family: -apple-system, system-ui; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 60px; }
        
        header { padding: 50px 20px 20px; text-align: center; border-bottom: 1px solid #222; }
        h1 { color: var(--gold); margin: 0; font-size: 1.5em; text-transform: uppercase; letter-spacing: 2px; }

        .tabs { display: flex; sticky: top; background: var(--card); margin: 15px; border-radius: 12px; padding: 4px; }
        .tabs button { flex: 1; padding: 12px; border: none; background: none; color: #777; font-weight: bold; border-radius: 8px; }
        .tabs button.active { background: var(--gold); color: black; }

        .content { padding: 0 15px; display: none; }
        .content.active { display: block; }

        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        
        .suggestion-box { background: #252525; border-radius: 8px; max-height: 150px; overflow-y: auto; display: none; margin-top: -10px; border: 1px solid var(--gold); }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #333; font-size: 0.9em; }

        button.primary { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--gold); color: black; font-weight: bold; font-size: 1em; margin-top: 10px; }
        
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0 5px; color: var(--gold); font-size: 0.8em; }
        input[type=range] { width: 100%; accent-color: var(--gold); }

        .log-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .log-item h3 { margin: 0; color: var(--gold); }
        .log-item .meta { font-size: 0.8em; opacity: 0.6; margin-bottom: 10px; }
        .delete-btn { color: #ff5555; background: none; border: none; font-size: 0.8em; margin-top: 10px; padding: 0; }
    </style>
</head>
<body>

<header>
    <h1>Bourbon Vault</h1>
</header>

<div class="tabs">
    <button class="t-btn active" onclick="openTab('log')">Log</button>
    <button class="t-btn" onclick="openTab('vault')">My Vault</button>
    <button class="t-btn" onclick="openTab('stats')">Analytics</button>
</div>

<div id="log" class="content active">
    <div class="card">
        <input id="bName" placeholder="Bourbon Name..." oninput="showSuggestions(this.value)">
        <div id="suggestions" class="suggestion-box"></div>
        
        <input id="bDistillery" placeholder="Distillery">
        <input id="bProof" placeholder="Proof">
        
        <div class="stat-row"><span>Sweetness</span><span id="v1">3</span></div>
        <input type="range" id="s1" min="1" max="5" value="3" oninput="v1.innerText=this.value">
        
        <div class="stat-row"><span>Oak/Wood</span><span id="v2">3</span></div>
        <input type="range" id="s2" min="1" max="5" value="3" oninput="v2.innerText=this.value">
        
        <div class="stat-row"><span>Spice/Heat</span><span id="v3">3</span></div>
        <input type="range" id="s3" min="1" max="5" value="3" oninput="v3.innerText=this.value">

        <input id="bScore" type="number" placeholder="Your Score (1-10)">
        <textarea id="bNotes" placeholder="Personal tasting notes..."></textarea>
        
        <button class="primary" onclick="saveBourbon()">Add to Collection</button>
    </div>
</div>

<div id="vault" class="content">
    <div id="vaultList"></div>
</div>

<div id="stats" class="content">
    <div class="card">
        <h3 style="text-align:center; color:var(--gold)">Palate Overview</h3>
        <canvas id="palateChart"></canvas>
    </div>
</div>

<script>
// --- AI GENERATED MASTER DATABASE ---
const AI_DATABASE = [
    { name: "Buffalo Trace", distillery: "Buffalo Trace", proof: 90, sweet: 4, oak: 3, spice: 2, notes: "Vanilla, caramel, and a hint of mint." },
    { name: "Eagle Rare 10", distillery: "Buffalo Trace", proof: 90, sweet: 3, oak: 4, spice: 3, notes: "Complex herbs, honey, and leather." },
    { name: "Blanton's Single Barrel", distillery: "Buffalo Trace", proof: 93, sweet: 4, oak: 3, spice: 4, notes: "Creamy vanilla, citrus, and oak." },
    { name: "Woodford Reserve", distillery: "Woodford Reserve", proof: 90, sweet: 3, oak: 3, spice: 3, notes: "Rich dried fruit and cocoa." },
    { name: "Wild Turkey 101", distillery: "Wild Turkey", proof: 101, sweet: 2, oak: 3, spice: 5, notes: "Bold spice, pepper, and deep oak." },
    { name: "Maker's Mark", distillery: "Maker's Mark", proof: 90, sweet: 5, oak: 2, spice: 2, notes: "Wheat-based, very sweet and smooth." },
    { name: "Knob Creek 9", distillery: "Jim Beam", proof: 100, sweet: 3, oak: 5, spice: 3, notes: "Robust, charred oak and toasted nuts." },
    { name: "Old Forester 1910", distillery: "Old Forester", proof: 93, sweet: 5, oak: 4, spice: 2, notes: "Double oaked, tastes like toasted marshmallows." },
    { name: "Elijah Craig Small Batch", distillery: "Heaven Hill", proof: 94, sweet: 3, oak: 4, spice: 3, notes: "Nutty, vanilla, and slight fruit." },
    { name: "Basil Hayden", distillery: "Jim Beam", proof: 80, sweet: 4, oak: 2, spice: 3, notes: "Light, spicy, and easy to drink." },
    { name: "Weller Special Reserve", distillery: "Buffalo Trace", proof: 90, sweet: 5, oak: 2, spice: 2, notes: "Butterscotch and soft honey notes." },
    { name: "Angel's Envy", distillery: "Angel's Envy", proof: 86, sweet: 5, oak: 2, spice: 2, notes: "Finished in Port casks, very fruity." },
    { name: "Bulleit Bourbon", distillery: "Bulleit", proof: 90, sweet: 2, oak: 3, spice: 4, notes: "High rye content, crisp and spicy." }
];

// --- APP LOGIC ---
let myVault = JSON.parse(localStorage.getItem("myBourbonVault") || "[]");

function openTab(tabId) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
    if(tabId === 'vault') renderVault();
    if(tabId === 'stats') renderStats();
}

function showSuggestions(input) {
    const box = document.getElementById("suggestions");
    if (input.length < 2) { box.style.display = "none"; return; }
    
    const matches = AI_DATABASE.filter(b => b.name.toLowerCase().includes(input.toLowerCase()));
    if (matches.length > 0) {
        box.innerHTML = matches.map(m => `<div class="suggestion-item" onclick="selectBourbon('${m.name}')">${m.name}</div>`).join('');
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

function selectBourbon(name) {
    const b = AI_DATABASE.find(x => x.name === name);
    document.getElementById("bName").value = b.name;
    document.getElementById("bDistillery").value = b.distillery;
    document.getElementById("bProof").value = b.proof;
    document.getElementById("s1").value = b.sweet; document.getElementById("v1").innerText = b.sweet;
    document.getElementById("s2").value = b.oak; document.getElementById("v2").innerText = b.oak;
    document.getElementById("s3").value = b.spice; document.getElementById("v3").innerText = b.spice;
    document.getElementById("bNotes").value = "Expert Notes: " + b.notes;
    document.getElementById("suggestions").style.display = "none";
}

function saveBourbon() {
    const entry = {
        name: document.getElementById("bName").value,
        dist: document.getElementById("bDistillery").value,
        proof: document.getElementById("bProof").value,
        sweet: document.getElementById("s1").value,
        oak: document.getElementById("s2").value,
        spice: document.getElementById("s3").value,
        score: document.getElementById("bScore").value,
        notes: document.getElementById("bNotes").value,
        id: Date.now()
    };
    if(!entry.name) return alert("Enter a name!");
    myVault.push(entry);
    localStorage.setItem("myBourbonVault", JSON.stringify(myVault));
    alert("Added to Vault!");
    location.reload(); 
}

function renderVault() {
    const list = document.getElementById("vaultList");
    list.innerHTML = myVault.length ? myVault.map(b => `
        <div class="log-item">
            <h3>${b.name}</h3>
            <div class="meta">${b.dist} • ${b.proof} Proof • <strong>Score: ${b.score}/10</strong></div>
            <p style="font-size:0.9em; margin:0;">${b.notes}</p>
            <button class="delete-btn" onclick="deleteEntry(${b.id})">Remove Entry</button>
        </div>
    `).reverse().join('') : "<p style='text-align:center; opacity:0.5;'>Your vault is empty.</p>";
}

function deleteEntry(id) {
    myVault = myVault.filter(x => x.id !== id);
    localStorage.setItem("myBourbonVault", JSON.stringify(myVault));
    renderVault();
}

let chart;
function renderStats() {
    const ctx = document.getElementById('palateChart').getContext('2d');
    if(chart) chart.destroy();
    
    const avg = (key) => myVault.length ? myVault.reduce((a,b) => a + Number(b[key]), 0) / myVault.length : 0;

    chart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Sweetness', 'Oak', 'Spice'],
            datasets: [{
                label: 'Average Palate',
                data: [avg('sweet'), avg('oak'), avg('spice')],
                backgroundColor: 'rgba(212, 162, 76, 0.2)',
                borderColor: '#d4a24c',
                borderWidth: 2
            }]
        },
        options: {
            scales: { r: { min: 0, max: 5, grid: { color: '#333' }, angleLines: { color: '#333' }, ticks: { display: false } } },
            plugins: { legend: { labels: { color: 'white' } } }
        }
    });
}
</script>
</body>
</html>
