<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bourbon Vault</title>

<style>

body{
font-family:-apple-system;
background:#0f0f0f;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#e0a34a;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:none;
background:#2c2c2c;
color:white;
}

button{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#e0a34a;
color:black;
font-weight:bold;
margin-top:8px;
}

.leaderboard{
margin-top:25px;
}

.bourbon{
background:#1a1a1a;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.rank{
font-size:20px;
font-weight:bold;
color:#e0a34a;
}

.score{
font-size:18px;
}

.delete{
background:#444;
margin-top:8px;
}

.search{
margin-bottom:15px;
}

</style>
</head>

<body>

<h1>🥃 Bourbon Vault</h1>

<div class="card">

<input id="name" placeholder="Bourbon Name">
<input id="distillery" placeholder="Distillery">
<input id="score" type="number" placeholder="Overall Score (1-10)">

<input id="sweet" type="number" placeholder="Sweetness (1-5)">
<input id="oak" type="number" placeholder="Oak (1-5)">
<input id="spice" type="number" placeholder="Spice (1-5)">
<input id="heat" type="number" placeholder="Proof Heat (1-5)">
<input id="complexity" type="number" placeholder="Complexity (1-5)">

<textarea id="notes" placeholder="Tasting Notes"></textarea>

<button onclick="addBourbon()">Add Bourbon</button>

</div>

<input class="search" id="search" placeholder="Search bourbons..." oninput="render()">

<div class="leaderboard">
<h2>🏆 Rankings</h2>
<div id="list"></div>
</div>

<script>

let bourbons = JSON.parse(localStorage.getItem("bourbonVault") || "[]")

function save(){
localStorage.setItem("bourbonVault", JSON.stringify(bourbons))
}

function addBourbon(){

let b={
name:name.value,
distillery:distillery.value,
score:Number(score.value),
sweet:sweet.value,
oak:oak.value,
spice:spice.value,
heat:heat.value,
complexity:complexity.value,
notes:notes.value
}

bourbons.push(b)

bourbons.sort((a,b)=>b.score-a.score)

save()
render()

document.querySelectorAll("input,textarea").forEach(el=>el.value="")
}

function deleteBourbon(i){
bourbons.splice(i,1)
save()
render()
}

function render(){

let search=document.getElementById("search").value.toLowerCase()

let html=""

bourbons
.filter(b=>b.name.toLowerCase().includes(search))
.forEach((b,i)=>{

html+=`
<div class="bourbon">

<div class="rank">#${i+1} ${b.name}</div>
<div>${b.distillery}</div>

<div class="score">⭐ ${b.score}/10</div>

<div>
Sweet: ${b.sweet} | Oak: ${b.oak} | Spice: ${b.spice} | Heat: ${b.heat} | Complexity: ${b.complexity}
</div>

<div>${b.notes}</div>

<button class="delete" onclick="deleteBourbon(${i})">Delete</button>

</div>
`
})

list.innerHTML=html

}

render()

</script>

</body>
</html>
