<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bourbon Vault Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/931/931920.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    
    <style>
        :root { --gold: #c3a36b; --gold-dim: #9a7f53; --bg: #000000; --card: #111111; --input: #1a1a1a; --text: #e0e0e0; --dim: #777; --hot: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: contain; }
        
        header { padding: 60px 20px 20px; text-align: center; background: linear-gradient(180deg, #111 0%, var(--bg) 100%); border-bottom: 1px solid #222; }
        h1 { color: var(--gold); margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }

        .tabs { display: flex; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); margin: 15px; border-radius: 12px; padding: 4px; border: 1px solid #222; z-index: 100; }
        .tabs button { flex: 1; padding: 12px; border: none; background: none; color: var(--dim); font-weight: bold; border-radius: 8px; font-size: 0.75em; text-transform: uppercase; }
        .tabs button.active { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; box-shadow: 0 4px 15px rgba(195, 163, 107, 0.3); }

        .content { padding: 0 15px; display: none; animation: fadeIn 0.3s ease; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: var(--input); color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        
        /* Fixed Dropdown Styling */
        .suggestion-box { background: #1a1a1a; border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; border: 1px solid var(--gold); position: absolute; width: calc(100% - 40px); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,1); }
        .suggestion-item { padding: 14px; border-bottom: 1px solid #333; font-size: 0.9em; color: var(--text); cursor: pointer; }
        .suggestion-item:active { background: #222; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; font-size: 0.9em; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; }
        .btn-dark { background: #222; color: var(--gold); border: 1px solid #333; }
        
        #scanner-container { width: 100%; height: 250px; background: #000; border-radius: 12px; margin-bottom: 15px; overflow: hidden; display: none; border: 2px solid var(--gold); position: relative; }
        #scanner-container video { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 2px; background: var(--hot); box-shadow: 0 0 10px var(--hot); animation: scanLine 2s infinite; }
        @keyframes scanLine { 0% { top: 20%; } 50% { top: 80%; } 100% { top: 20%; } }

        .photo-container { width: 100%; height: 120px; background: #1a1a1a; border-radius: 12px; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; color: var(--dim); overflow: hidden; margin: 10px 0; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        .vault-item { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #222; }
        .item-header { display: flex; gap: 12px; align-items: center; }
        .item-photo-mini { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #222; }
        .tag { background: #1a1a1a; padding: 4px 8px; border-radius: 4px; font-size: 0.65em; font-weight: bold; color: var(--text); border: 1px solid #333; margin-right: 5px; }
        
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0 4px; color: var(--gold); font-size: 0.8em; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--gold); height: 6px; }
    </style>
</head>
<body>

<header>
    <h1>Bourbon Vault Pro</h1>
</header>

<div class="tabs">
    <button class="t-btn active" onclick="openTab('log', this)">Log</button>
    <button class="t-btn" onclick="openTab('vault', this)">Vault</button>
    <button class="t-btn" onclick="openTab('stats', this)">Stats</button>
</div>

<div id="log" class="content active">
    <div class="card">
        <button class="btn btn-dark" id="scanBtn" onclick="toggleScanner()">🔍 Scan Barcode</button>
        <div id="scanner-container"><div class="scanner-overlay"></div></div>

        <div style="position:relative;">
            <input id="bName" placeholder="Search or Type Name..." oninput="showSuggestions(this.value)" onblur="hideSuggestions()" autocomplete="off">
            <div id="suggestions" class="suggestion-box"></div>
        </div>

        <input id="bDistillery" placeholder="Distillery">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="bProof" type="number" step="0.1" placeholder="Proof">
            <input id="bPrice" type="number" placeholder="Price $">
        </div>

        <div class="photo-container" onclick="document.getElementById('photoInput').click()">
            <span id="photoPlaceholder">📷 Add Bottle Photo</span>
            <img id="photoPreview" style="display:none;">
        </div>
        <input type="file" id="photoInput" accept="image/*" capture="camera" onchange="handlePhoto(this)" style="display:none;">
        
        <div class="stat-row"><span>Sweetness</span><span id="v1">3</span></div>
        <input type="range" id="s1" min="1" max="5" value="3" oninput="v1.innerText=this.value">
        
        <div class="stat-row"><span>Oak</span><span id="v2">3</span></div>
        <input type="range" id="s2" min="1" max="5" value="3" oninput="v2.innerText=this.value">
        
        <div class="stat-row"><span>Spice</span><span id="v3">3</span></div>
        <input type="range" id="s3" min="1" max="5" value="3" oninput="v3.innerText=this.value">

        <input id="bScore" type="number" placeholder="Rating (1-10)">
        <textarea id="bNotes" placeholder="Tasting notes..."></textarea>
        
        <button class="btn btn-gold" onclick="saveBourbon()">Add to Vault</button>
    </div>
</div>

<div id="vault" class="content">
    <div id="vaultList"></div>
</div>

<div id="stats" class="content">
    <div class="card">
        <h3 style="color:var(--gold); margin:0 0 15px; font-size:0.9em;">Your Flavor Profile</h3>
        <canvas id="palateChart"></canvas>
    </div>
</div>

<script>
// --- MASTER DB ---
const AI_DATABASE = [
    { name: "Noah's Mill", distillery: "Willett", proof: 114.3, sweet: 3, oak: 4, spice: 5, notes: "Heavy walnut and spice." },
    { name: "Four Roses Single Barrel", distillery: "Four Roses", proof: 100, sweet: 2, oak: 3, spice: 5, notes: "Floral and high-rye spice." },
    { name: "Eagle Rare 10", distillery: "Buffalo Trace", proof: 90, sweet: 4, oak: 4, spice: 2, notes: "Orange peel and leather." },
    { name: "Old Forester 1920", distillery: "Old Forester", proof: 115, sweet: 4, oak: 3, spice: 4, notes: "Dark cherry and chocolate." }
];

let db;
const req = indexedDB.open("BourbonVaultDB", 1);
req.onupgradeneeded = e => e.target.result.createObjectStore("bottles", { keyPath: "id" });
req.onsuccess = e => { db = e.target.result; renderVault(); };

// --- BUG-FREE SELECTION LOGIC ---
function showSuggestions(val) {
    const box = document.getElementById("suggestions");
    if (val.length < 2) { box.style.display = "none"; return; }
    const matches = AI_DATABASE.filter(b => b.name.toLowerCase().includes(val.toLowerCase()));
    if (matches.length) {
        box.innerHTML = matches.map((m, i) => 
            `<div class="suggestion-item" onmousedown="selectLocalBourbon(${AI_DATABASE.indexOf(m)})">${m.name}</div>`
        ).join('');
        box.style.display = "block";
    } else { box.style.display = "none"; }
}

function hideSuggestions() {
    setTimeout(() => { document.getElementById("suggestions").style.display = "none"; }, 200);
}

function selectLocalBourbon(idx) {
    const b = AI_DATABASE[idx];
    document.getElementById("bName").value = b.name;
    document.getElementById("bDistillery").value = b.distillery;
    document.getElementById("bProof").value = b.proof;
    document.getElementById("s1").value = b.sweet; v1.innerText = b.sweet;
    document.getElementById("s2").value = b.oak; v2.innerText = b.oak;
    document.getElementById("s3").value = b.spice; v3.innerText = b.spice;
    document.getElementById("bNotes").value = b.notes;
    document.getElementById("suggestions").style.display = "none";
}

// --- SCANNER & HEURISTIC LOGIC ---
let isScanning = false;
function toggleScanner() {
    const cont = document.getElementById('scanner-container');
    const btn = document.getElementById('scanBtn');
    if (isScanning) { Quagga.stop(); cont.style.display = 'none'; btn.innerText = '🔍 Scan Barcode'; isScanning = false; }
    else { cont.style.display = 'block'; btn.innerText = '🛑 Stop'; isScanning = true; startScanner(); }
}

function startScanner() {
    Quagga.init({
        inputStream: { type: "LiveStream", target: document.querySelector('#scanner-container'), constraints: { facingMode: "environment" } },
        decoder: { readers: ["upc_reader", "upc_e_reader", "ean_reader"] }
    }, (err) => { if (!err) Quagga.start(); });

    Quagga.onDetected(async (data) => {
        const code = data.codeResult.code;
        Quagga.stop(); toggleScanner();
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const json = await res.json();
            if (json.status === 1) {
                const name = json.product.product_name || "";
                document.getElementById('bName').value = name;
                document.getElementById('bDistillery').value = json.product.brands || "";
                
                // HEURISTIC ESTIMATOR:
                let s=3, o=3, sp=3;
                if(name.toLowerCase().includes("rye")) sp = 5;
                if(name.toLowerCase().includes("wheat") || name.toLowerCase().includes("weller")) s = 5;
                if(name.toLowerCase().includes("oak") || name.toLowerCase().includes("aged")) o = 4;
                
                document.getElementById('s1').value = s; v1.innerText = s;
                document.getElementById('s2').value = o; v2.innerText = o;
                document.getElementById('s3').value = sp; v3.innerText = sp;
                document.getElementById('bNotes').value = "Estimated profile based on name analysis.";
            }
        } catch (e) { alert("Network Error"); }
    });
}

// --- UTILS ---
function openTab(id, btn) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if(id === 'stats') renderStats();
}

let currentPhoto = null;
function handlePhoto(input) {
    const reader = new FileReader();
    reader.onload = e => { 
        currentPhoto = e.target.result; 
        document.getElementById('photoPreview').src = currentPhoto;
        document.getElementById('photoPreview').style.display = "block";
        document.getElementById('photoPlaceholder').style.display = "none";
    };
    reader.readAsDataURL(input.files[0]);
}

function saveBourbon() {
    const entry = {
        name: document.getElementById("bName").value,
        dist: document.getElementById("bDistillery").value,
        proof: Number(document.getElementById("bProof").value),
        sweet: Number(document.getElementById("s1").value),
        oak: Number(document.getElementById("s2").value),
        spice: Number(document.getElementById("s3").value),
        score: Number(document.getElementById("bScore").value),
        notes: document.getElementById("bNotes").value,
        photo: currentPhoto,
        id: Date.now()
    };
    if(!entry.name) return;
    const tx = db.transaction("bottles", "readwrite");
    tx.objectStore("bottles").add(entry);
    tx.onsuccess = () => location.reload();
}

function renderVault() {
    const store = db.transaction("bottles").objectStore("bottles");
    store.getAll().onsuccess = e => {
        const bottles = e.target.result;
        document.getElementById("vaultList").innerHTML = bottles.map(b => `
            <div class="vault-item">
                <div class="item-header">
                    <img src="${b.photo || 'https://via.placeholder.com/50'}" class="item-photo-mini">
                    <div><h3 style="margin:0; color:var(--gold);">${b.name}</h3><small style="opacity:0.6">${b.dist}</small></div>
                </div>
                <div style="margin:10px 0;"><span class="tag">${b.proof} Proof</span><span class="tag">Rating: ${b.score}/10</span></div>
                <p style="font-size:0.8em; margin:0; color:var(--dim)">${b.notes}</p>
            </div>
        `).reverse().join('');
    };
}

function renderStats() {
    const store = db.transaction("bottles").objectStore("bottles");
    store.getAll().onsuccess = e => {
        const my = e.target.result;
        if(!my.length) return;
        const avg = (k) => my.reduce((a,b)=>a+b[k],0)/my.length;
        new Chart(document.getElementById('palateChart'), {
            type: 'radar',
            data: {
                labels: ['Sweet', 'Oak', 'Spice'],
                datasets: [{ data: [avg('sweet'), avg('oak'), avg('spice')], borderColor: '#c3a36b', backgroundColor: 'rgba(195,163,107,0.2)' }]
            },
            options: { scales: { r: { min:0, max:5, grid: { color: '#333' } } }, plugins: { legend: { display: false } } }
        });
    };
}
</script>
</body>
</html>
