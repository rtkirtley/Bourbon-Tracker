<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bourbon Vault AI Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/931/931920.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --gold: #c3a36b; --gold-dim: #9a7f53; --bg: #000000; --card: #111111; --input: #1a1a1a; --text: #e0e0e0; --dim: #777; --hot: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: contain; }
        
        header { padding: 60px 20px 20px; text-align: center; background: linear-gradient(180deg, #111 0%, var(--bg) 100%); border-bottom: 1px solid #222; }
        h1 { color: var(--gold); margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }

        .tabs { display: flex; position: sticky; top: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); margin: 15px; border-radius: 12px; padding: 4px; border: 1px solid #222; z-index: 100; }
        .tabs button { flex: 1; padding: 12px; border: none; background: none; color: var(--dim); font-weight: bold; border-radius: 8px; font-size: 0.75em; text-transform: uppercase; }
        .tabs button.active { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; box-shadow: 0 4px 15px rgba(195, 163, 107, 0.3); }

        .content { padding: 0 15px; display: none; }
        .content.active { display: block; }

        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: var(--input); color: white; font-size: 16px; box-sizing: border-box; outline: none; -webkit-appearance: none; }
        
        .suggestion-box { background: #1a1a1a; border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; border: 1px solid var(--gold); position: absolute; width: 100%; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,1); }
        .suggestion-item { padding: 14px; border-bottom: 1px solid #333; font-size: 0.9em; display: flex; justify-content: space-between; align-items: center; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-gold { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; }

        .vault-item { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #222; }
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0 4px; color: var(--gold); font-size: 0.8em; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--gold); height: 6px; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 24px; border-radius: 50px; font-weight: bold; display: none; z-index: 3000; }
        #radarContainer { height: 250px; width: 100%; margin: 10px 0; }
    </style>
</head>
<body>

<header><h1>Bourbon Vault AI</h1></header>

<div class="tabs">
    <button class="t-btn active" onclick="openTab('log', this)">Log</button>
    <button class="t-btn" onclick="openTab('vault', this)">Vault</button>
    <button class="t-btn" onclick="openTab('ai', this); runAI();">AI Sommelier</button>
</div>

<div id="log" class="content active">
    <div class="card">
        <div style="position:relative;">
            <input id="bName" placeholder="Search bottle name..." oninput="handleSearch(this.value)" onblur="hideSuggestions()" autocomplete="off">
            <div id="suggestions" class="suggestion-box"></div>
        </div>
        <input id="bDistillery" placeholder="Distillery">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="bProof" type="number" step="0.1" placeholder="Proof">
            <input id="bPrice" type="number" placeholder="Price $">
        </div>
        <div class="stat-row"><span>Sweetness</span><span id="v1">3</span></div>
        <input type="range" id="s1" min="1" max="5" value="3" oninput="v1.innerText=this.value">
        <div class="stat-row"><span>Oak</span><span id="v2">3</span></div>
        <input type="range" id="s2" min="1" max="5" value="3" oninput="v2.innerText=this.value">
        <div class="stat-row"><span>Spice</span><span id="v3">3</span></div>
        <input type="range" id="s3" min="1" max="5" value="3" oninput="v3.innerText=this.value">
        <input id="bScore" type="number" placeholder="Rating (1-10)">
        <textarea id="bNotes" placeholder="Personal notes..."></textarea>
        <button class="btn btn-gold" onclick="saveBourbon()">Save Bottle</button>
    </div>
</div>

<div id="vault" class="content">
    <div id="vaultList"></div>
</div>

<div id="ai" class="content">
    <div class="card">
        <h3 style="color:var(--gold); margin-top:0; font-size:0.9em; text-transform:uppercase;">Your Palate Map</h3>
        <div id="radarContainer"><canvas id="palateChart"></canvas></div>
        <p id="aiSummary" style="font-size:0.85em; color:#bbb; line-height:1.6;"></p>
    </div>
    <h3 style="font-size:0.8em; text-transform:uppercase; color:var(--dim); margin-left:10px;">AI Recommended Bottles</h3>
    <div id="aiRecs"></div>
</div>

<div id="toast" class="toast">Added!</div>

let db;
let palateChart = null;
const request = indexedDB.open("BourbonVault_Final_PRO_V5", 1);
request.onupgradeneeded = e => { e.target.result.createObjectStore("bottles", { keyPath: "id" }); };
request.onsuccess = e => { db = e.target.result; renderVault(); };

// --- AI BRAIN: WEIGHTED ALGORITHM ---
function runAI() {
    const store = db.transaction("bottles").objectStore("bottles");
    store.getAll().onsuccess = e => {
        const bottles = e.target.result;
        if (bottles.length < 3) {
            document.getElementById("aiSummary").innerText = "Log at least 3 bottles to activate AI analysis.";
            return;
        }

        let tW = 0, wS = 0, wO = 0, wSp = 0;
        bottles.forEach(b => {
            const weight = Math.pow(b.score, 2.5); // Exponential weighting
            wS += b.sweet * weight; wO += b.oak * weight; wSp += b.spice * weight;
            tW += weight;
        });

        const fp = { s: (wS / tW).toFixed(2), o: (wO / tW).toFixed(2), sp: (wSp / tW).toFixed(2) };
        renderRadar(fp);
        
        const myNames = bottles.map(b => b.name);
        const recs = ELITE_DATABASE.filter(eb => !myNames.includes(eb.name))
            .map(eb => {
                const diff = Math.sqrt(Math.pow(eb.sweet - fp.s, 2) + Math.pow(eb.oak - fp.o, 2) + Math.pow(eb.spice - fp.sp, 2));
                return { ...eb, match: Math.round((1 - diff/5) * 100) };
            })
            .sort((a, b) => b.match - a.match).slice(0, 3);

        document.getElementById("aiRecs").innerHTML = recs.map(r => `
            <div class="vault-item" style="border-left: 4px solid var(--gold);">
                <h4 style="margin:0; color:var(--gold);">${r.name}</h4>
                <div style="font-size:0.75em; margin-top:4px;">${r.dist} • AI Match: ${r.match}%</div>
            </div>
        `).join('');

        document.getElementById("aiSummary").innerText = `AI Insights: Your palate is ${(fp.s > 4) ? 'Sweet-Dominant' : (fp.sp > 3.8) ? 'Spice-Heavy' : 'Balanced'}. Based on your ratings, you seek out ${fp.o > 4 ? 'mature, tannic' : 'vibrant, young'} profiles.`;
    };
}

function renderRadar(fp) {
    const ctx = document.getElementById('palateChart').getContext('2d');
    if (palateChart) palateChart.destroy();
    palateChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Sweetness', 'Oak Influence', 'Rye/Heat Spice'],
            datasets: [{
                data: [fp.s, fp.o, fp.sp],
                backgroundColor: 'rgba(195, 163, 107, 0.4)',
                borderColor: '#c3a36b',
                borderWidth: 2,
                pointBackgroundColor: '#fff'
            }]
        },
        options: {
            scales: { r: { min: 0, max: 5, grid: { color: '#333' }, ticks: { display: false }, pointLabels: { color: '#888', font: { size: 10 } } } },
            plugins: { legend: { display: false } }
        }
    });
}

// --- APP UTILS ---
function handleSearch(q) {
    const box = document.getElementById("suggestions");
    if (q.length < 2) { box.style.display = "none"; return; }
    const matches = ELITE_DATABASE.filter(b => b.name.toLowerCase().includes(q.toLowerCase()));
    box.innerHTML = matches.slice(0, 12).map(m => `
        <div class="suggestion-item" onpointerdown="applyLocal(${ELITE_DATABASE.indexOf(m)})">
            <span>⭐ ${m.name}</span> <small style="color:var(--dim)">${m.dist}</small>
        </div>
    `).join('');
    box.style.display = "block";
}

function applyLocal(i) {
    const b = ELITE_DATABASE[i];
    document.getElementById('bName').value = b.name;
    document.getElementById('bDistillery').value = b.dist;
    document.getElementById('bProof').value = b.proof;
    document.getElementById('s1').value = b.sweet; v1.innerText = b.sweet;
    document.getElementById('s2').value = b.oak; v2.innerText = b.oak;
    document.getElementById('s3').value = b.spice; v3.innerText = b.spice;
    document.getElementById('bNotes').value = b.notes;
    document.getElementById("suggestions").style.display = "none";
}

function hideSuggestions() { setTimeout(() => { document.getElementById("suggestions").style.display = "none"; }, 300); }

function saveBourbon() {
    const entry = {
        id: Date.now(),
        name: document.getElementById("bName").value,
        dist: document.getElementById("bDistillery").value,
        proof: document.getElementById("bProof").value,
        sweet: Number(document.getElementById("s1").value),
        oak: Number(document.getElementById("s2").value),
        spice: Number(document.getElementById("s3").value),
        score: Number(document.getElementById("bScore").value) || 5,
        notes: document.getElementById("bNotes").value
    };
    db.transaction("bottles", "readwrite").objectStore("bottles").add(entry).onsuccess = () => {
        showToast(); clearForm(); renderVault();
    };
}

function renderVault() {
    if (!db) return;
    db.transaction("bottles").objectStore("bottles").getAll().onsuccess = e => {
        document.getElementById("vaultList").innerHTML = e.target.result.map(b => `
            <div class="vault-item">
                <div style="display:flex; justify-content:space-between;">
                    <h4 style="margin:0; color:var(--gold);">${b.name}</h4>
                    <b>${b.score}/10</b>
                </div>
                <small style="opacity:0.6">${b.dist} • ${b.proof} Proof</small>
            </div>
        `).reverse().join('');
    };
}

function showToast() { document.getElementById("toast").style.display = "block"; setTimeout(() => { document.getElementById("toast").style.display = "none"; }, 2000); }
function clearForm() { document.querySelectorAll('input, textarea').forEach(i => i.value = ""); }
function openTab(id, btn) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}
</script>
</body>
</html>
