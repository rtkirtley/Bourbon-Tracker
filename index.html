<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bourbon Vault Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/931/931920.png">
    
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #c3a36b; --gold-dim: #9a7f53; --bg: #000000; --card: #111111; --input: #1a1a1a; --text: #e0e0e0; --dim: #777; --hot: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: contain; }
        
        /* Modern Header */
        header { padding: 70px 20px 20px; text-align: center; background: linear-gradient(180deg, #111 0%, var(--bg) 100%); border-bottom: 1px solid #222; }
        h1 { color: var(--gold); margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }

        /* Modern Tabs */
        .tabs { display: flex; sticky: top; background: rgba(17,17,17,0.9); backdrop-filter: blur(10px); margin: 15px; border-radius: 12px; padding: 4px; border: 1px solid #222; z-index: 100; }
        .tabs button { flex: 1; padding: 12px; border: none; background: none; color: var(--dim); font-weight: bold; border-radius: 8px; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .tabs button.active { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; box-shadow: 0 4px 15px rgba(195, 163, 107, 0.3); }

        .content { padding: 0 15px; display: none; animation: fadeIn 0.4s ease; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Modern Forms */
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: var(--input); color: white; font-size: 16px; box-sizing: border-box; outline: none; appearance: none; }
        input:focus { border-color: var(--gold); background: #222; }
        
        .suggestion-box { background: #1a1a1a; border-radius: 8px; max-height: 200px; overflow-y: auto; display: none; border: 1px solid var(--gold); position: absolute; width: calc(100% - 70px); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .suggestion-item { padding: 14px; border-bottom: 1px solid #333; font-size: 0.9em; color: var(--text); }
        .suggestion-item:last-child { border-bottom: none; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-gold { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-dark { background: #222; color: var(--gold); border: 1px solid #333; }
        .btn:active { transform: scale(0.98); }
        
        /* Sliders */
        .stat-row { display: flex; justify-content: space-between; margin: 12px 0 4px; color: var(--gold); font-size: 0.8em; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: var(--gold); height: 6px; margin: 0 0 15px 0; }

        /* Photo Interface */
        .photo-container { width: 100%; height: 150px; background: #1a1a1a; border-radius: 12px; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 0.8em; overflow: hidden; position: relative; cursor: pointer; margin: 10px 0; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        #photoInput { display: none; }

        /* Vault Items */
        .vault-item { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; position: relative; border: 1px solid #222; }
        .item-header { display: flex; gap: 12px; align-items: center; }
        .item-photo-mini { width: 50px; height: 50px; border-radius: 8px; background: #222; object-fit: cover; border: 1px solid #333; }
        .item-info { flex: 1; }
        .vault-item h3 { margin: 0 0 2px 0; color: var(--gold); font-size: 1.1em; }
        .vault-item h4 { margin: 0 0 8px 0; color: var(--dim); font-size: 0.8em; font-weight: normal; }
        
        .tag-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        .tag { background: #1a1a1a; padding: 4px 8px; border-radius: 4px; font-size: 0.65em; font-weight: bold; text-transform: uppercase; color: var(--text); border: 1px solid #333; }
        .alloc { border-color: var(--hot); color: var(--hot); }
        
        .proof-track { height: 3px; width: 100%; background: #222; border-radius: 2px; margin: 10px 0; }
        .proof-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--hot)); border-radius: 2px; }

        .score-badge { position: absolute; top: 18px; right: 18px; background: rgba(195, 163, 107, 0.1); color: var(--gold); padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 0.9em; border: 1px solid rgba(195, 163, 107, 0.3); }
        .delete-btn { color: #555; background: none; border: none; font-size: 0.7em; margin-top: 15px; text-decoration: underline; padding: 0; }

        /* Recommendation UI */
        .reco-card { background: linear-gradient(145deg, #111, #000); border: 2px solid var(--gold); position: relative; overflow: hidden; }
        .reco-card::after { content: '★'; position: absolute; font-size: 15em; color: rgba(195,163,107,0.03); bottom: -50px; right: -30px; z-index: 0; }
        .reco-content { position: relative; z-index: 1; }
    </style>
</head>
<body>

<header>
    <h1>Bourbon Vault Pro</h1>
</header>

<div class="tabs">
    <button class="t-btn active" onclick="openTab('log', this)">Log</button>
    <button class="t-btn" onclick="openTab('vault', this)">Vault</button>
    <button class="t-btn" onclick="openTab('stats', this)">Analytics</button>
</div>

<div id="log" class="content active">
    <div class="card">
        <input id="bName" placeholder="Find Bourbon..." oninput="showSuggestions(this.value)">
        <div id="suggestions" class="suggestion-box"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="bDistillery" placeholder="Distillery">
            <input id="bProof" placeholder="Proof">
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="bPrice" type="number" placeholder="Price Paid $">
            <select id="bRarity">
                <option value="Common">Common</option>
                <option value="Shelfer">Solid Shelfer</option>
                <option value="Allocated">Allocated</option>
                <option value="Unicorn">Unicorn</option>
            </select>
        </div>

        <div class="photo-container" onclick="triggerPhoto()">
            <span id="photoPlaceholder">📷 Tap to Take Bottle Photo</span>
            <img id="photoPreview" style="display:none;">
        </div>
        <input type="file" id="photoInput" accept="image/*" capture="camera" onchange="handlePhoto(this)">
        
        <div class="stat-row"><span>Sweetness</span><span id="v1">3</span></div>
        <input type="range" id="s1" min="1" max="5" value="3" oninput="v1.innerText=this.value">
        
        <div class="stat-row"><span>Oak / Wood</span><span id="v2">3</span></div>
        <input type="range" id="s2" min="1" max="5" value="3" oninput="v2.innerText=this.value">
        
        <div class="stat-row"><span>Spice / Heat</span><span id="v3">3</span></div>
        <input type="range" id="s3" min="1" max="5" value="3" oninput="v3.innerText=this.value">

        <input id="bScore" type="number" placeholder="Your Rating (1-10)" max="10">
        <textarea id="bNotes" placeholder="Personal tasting notes..." style="height:80px;"></textarea>
        
        <button class="btn btn-gold" onclick="saveBourbon()">Add to Vault</button>
    </div>
</div>

<div id="vault" class="content">
    <div id="vaultList"></div>
</div>

<div id="stats" class="content">
    <div class="card reco-card">
        <div class="reco-content">
            <h3 style="color:var(--gold); margin-top:0; font-size:1em; text-transform:uppercase; letter-spacing:2px;">Palate Match</h3>
            <p style="font-size:0.8em; color:var(--dim); margin-bottom:15px;">Based on your top-rated bottles, we recommend hunting for:</p>
            <div id="recoResult" style="min-height: 50px; color:white; font-weight:bold; font-size:1.2em;">
                <span style="opacity:0.3;">Log 3+ highly rated bottles first...</span>
            </div>
            <button class="btn btn-dark" onclick="getRecommendation()" style="margin-top:20px;">Get Recommendation</button>
        </div>
    </div>

    <div class="card">
        <h3 style="text-align:center; color:var(--gold); margin-top:0; font-size:0.9em; text-transform:uppercase; letter-spacing:2px;">Average Palate</h3>
        <canvas id="palateChart"></canvas>
    </div>
    <div id="summaryStats" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
</div>

<script>
// --- REGISTER SERVICE WORKER (For Image Persistence) ---
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
}

// --- MASTER AFICIONADO DATABASE (Vector Data Added) ---
const AI_DATABASE = [
    { name: "Noah's Mill", distillery: "Willett", proof: 114.3, sweet: 3, oak: 4, spice: 5, notes: "Walnut, prune, heavy spice.", rarity: "Shelfer" },
    { name: "Rowan's Creek", distillery: "Willett", proof: 100.1, sweet: 4, oak: 3, spice: 3, notes: "Caramel, pear, herbal mint.", rarity: "Shelfer" },
    { name: "Weller Antique 107", distillery: "Buffalo Trace", proof: 107, sweet: 5, oak: 3, spice: 3, notes: "Cinnamon, vanilla bean, wheated.", rarity: "Allocated" },
    { name: "Weller Special Reserve", distillery: "Buffalo Trace", proof: 90, sweet: 5, oak: 2, spice: 2, notes: "Butterscotch and soft honey.", rarity: "Shelfer" },
    { name: "Stagg", distillery: "Buffalo Trace", proof: 130.2, sweet: 4, oak: 4, spice: 5, notes: "Dark cherry, fudge, massive heat.", rarity: "Allocated" },
    { name: "Blanton's", distillery: "Buffalo Trace", proof: 93, sweet: 4, oak: 3, spice: 4, notes: "Citrus, oak, light vanilla.", rarity: "Allocated" },
    { name: "Eagle Rare 10", distillery: "Buffalo Trace", proof: 90, sweet: 3, oak: 4, spice: 3, notes: "Toffee, orange peel, leather.", rarity: "Shelfer" },
    { name: "Old Forester 1910", distillery: "Old Forester", proof: 93, sweet: 5, oak: 4, spice: 2, notes: "Double oaked, marshmallow.", rarity: "Common" },
    { name: "Old Forester 1920", distillery: "Old Forester", proof: 115, sweet: 4, oak: 3, spice: 4, notes: "Dark fruit, nuttiness, heavy heat.", rarity: "Common" },
    { name: "Booker's", distillery: "Jim Beam", proof: 126.8, sweet: 3, oak: 5, spice: 4, notes: "Peanut, vanilla, intense wood.", rarity: "Allocated" },
    { name: "Elijah Craig Barrel Proof", distillery: "Heaven Hill", proof: 120, sweet: 3, oak: 5, spice: 4, notes: "Deep molasses, black pepper.", rarity: "Allocated" },
    { name: "Henry McKenna 10yr BIB", distillery: "Heaven Hill", proof: 100, sweet: 3, oak: 4, spice: 4, notes: "Classic bonded profile, burnt sugar.", rarity: "Shelfer" },
    { name: "Angel's Envy", distillery: "Angel's Envy", proof: 86.6, sweet: 5, oak: 2, spice: 2, notes: "Finished in Port casks, fruity and soft.", rarity: "Common" },
    { name: "Wild Turkey Rare Breed", distillery: "Wild Turkey", proof: 116.8, sweet: 3, oak: 4, spice: 5, notes: "Honey, complex spice, orange.", rarity: "Shelfer" }
];

// --- INDEXEDDB SETUP (For reliable image storage) ---
let db;
const request = indexedDB.open("BourbonVaultDB", 1);
request.onupgradeneeded = (e) => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("bottles")) {
        db.createObjectStore("bottles", { keyPath: "id" });
    }
};
request.onsuccess = (e) => { db = e.target.result; renderVault(); };

// --- UI Logic ---
function openTab(tabId, btn) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
    if(tabId === 'stats') renderStats();
}

// --- Autocomplete ---
function showSuggestions(input) {
    const box = document.getElementById("suggestions");
    if (input.length < 2) { box.style.display = "none"; return; }
    const matches = AI_DATABASE.filter(b => b.name.toLowerCase().includes(input.toLowerCase()));
    if (matches.length > 0) {
        box.innerHTML = matches.map(m => `<div class="suggestion-item" onclick="selectBourbon('${m.name}')">${m.name}</div>`).join('');
        box.style.display = "block";
    } else { box.style.display = "none"; }
}

function selectBourbon(name) {
    const b = AI_DATABASE.find(x => x.name === name);
    document.getElementById("bName").value = b.name;
    document.getElementById("bDistillery").value = b.distillery;
    document.getElementById("bProof").value = b.proof;
    document.getElementById("s1").value = b.sweet; v1.innerText = b.sweet;
    document.getElementById("s2").value = b.oak; v2.innerText = b.oak;
    document.getElementById("s3").value = b.spice; v3.innerText = b.spice;
    document.getElementById("bRarity").value = b.rarity;
    document.getElementById("bNotes").value = "AI Notes: " + b.notes;
    document.getElementById("suggestions").style.display = "none";
}

// --- Photo Handling (Compresses image to save local space) ---
let currentPhotoBase64 = null;
function triggerPhoto() { document.getElementById('photoInput').click(); }

function handlePhoto(input) {
    const file = input.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            // Compress using Canvas
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 400; // Keep photos small
            const scale = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scale;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.7); // 70% quality JPEG
            document.getElementById('photoPreview').src = currentPhotoBase64;
            document.getElementById('photoPreview').style.display = "block";
            document.getElementById('photoPlaceholder').style.display = "none";
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// --- Save Data to IndexedDB ---
function saveBourbon() {
    const entry = {
        name: document.getElementById("bName").value,
        dist: document.getElementById("bDistillery").value,
        proof: Number(document.getElementById("bProof").value) || 0,
        price: Number(document.getElementById("bPrice").value) || 0,
        rarity: document.getElementById("bRarity").value,
        sweet: Number(document.getElementById("s1").value),
        oak: Number(document.getElementById("s2").value),
        spice: Number(document.getElementById("s3").value),
        score: Number(document.getElementById("bScore").value) || 0,
        notes: document.getElementById("bNotes").value,
        photo: currentPhotoBase64, // The compressed image
        id: Date.now()
    };
    if(!entry.name) return alert("Name required!");

    const transaction = db.transaction(["bottles"], "readwrite");
    const store = transaction.objectStore("bottles");
    store.add(entry);

    transaction.onsuccess = () => {
        alert("Added to Vault!");
        location.reload(); 
    };
}

// --- Render Vault from IndexedDB ---
function renderVault() {
    const list = document.getElementById("vaultList");
    const store = db.transaction(["bottles"]).objectStore("bottles");
    const request = store.getAll();

    request.onsuccess = () => {
        const bottles = request.result;
        list.innerHTML = bottles.length ? bottles.map(b => `
            <div class="vault-item">
                <span class="score-badge">${b.score}/10</span>
                <div class="item-header">
                    <img src="${b.photo || 'https://via.placeholder.com/100x100?text=No+Photo'}" class="item-photo-mini">
                    <div class="item-info">
                        <h3>${b.name}</h3>
                        <h4>${b.dist}</h4>
                    </div>
                </div>
                <div class="proof-track"><div class="proof-fill" style="width:${Math.min((b.proof - 80) * 2, 100)}%"></div></div>
                <div class="tag-row">
                    <span class="tag" style="color:var(--gold);">${b.proof} Proof</span>
                    <span class="tag ${b.rarity === 'Unicorn' || b.rarity === 'Allocated' ? 'alloc' : ''}">${b.rarity}</span>
                    ${b.price ? `<span class="tag">$${b.price}</span>` : ''}
                </div>
                <p style="font-size:0.85em; color:var(--dim); margin:10px 0;">${b.notes}</p>
                <button class="delete-btn" onclick="deleteEntry(${b.id})">Remove Bottle</button>
            </div>
        `).reverse().join('') : "<p style='text-align:center; opacity:0.3; padding:40px; font-size:0.8em;'>Vault is empty.</p>";
    };
}

function deleteEntry(id) {
    if(confirm("Remove this bottle?")) {
        const transaction = db.transaction(["bottles"], "readwrite");
        transaction.objectStore("bottles").delete(id);
        transaction.onsuccess = () => renderVault();
    }
}

// --- Analytics & Vector Recommendation Engine ---
let chart;
function renderStats() {
    const store = db.transaction(["bottles"]).objectStore("bottles");
    store.getAll().onsuccess = (e) => {
        const items = e.target.result;
        if(!items.length) return;

        const avg = (key) => items.reduce((a,b) => a + Number(b[key]), 0) / items.length;
        const totalSpend = items.reduce((a,b) => a + Number(b.price), 0);
        
        document.getElementById('summaryStats').innerHTML = `
            <div class="card" style="text-align:center; padding:15px;"><div style="font-size:0.65em; color:var(--dim); text-transform:uppercase;">Invested</div><div style="font-size:1.2em; color:var(--gold); font-weight:bold;">$${totalSpend.toFixed(2)}</div></div>
            <div class="card" style="text-align:center; padding:15px;"><div style="font-size:0.65em; color:var(--dim); text-transform:uppercase;">Bottles</div><div style="font-size:1.2em; color:var(--gold); font-weight:bold;">${items.length}</div></div>
        `;

        const ctx = document.getElementById('palateChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Sweetness', 'Oak', 'Spice'],
                datasets: [{
                    data: [avg('sweet'), avg('oak'), avg('spice')],
                    backgroundColor: 'rgba(195, 163, 107, 0.15)',
                    borderColor: '#c3a36b',
                    borderWidth: 2,
                    pointRadius: 0
                }]
            },
            options: {
                scales: { r: { min: 0, max: 5, grid: { color: '#222' }, angleLines: { color: '#222' }, ticks: { display: false }, pointLabels: { color: '#777', font: { size: 10, weight: 'bold' } } } },
                plugins: { legend: { display: false } }
            }
        });
    };
}

// --- Quantum Recommendation Engine (Local Palate Matching) ---
function getRecommendation() {
    const resultBox = document.getElementById("recoResult");
    resultBox.innerHTML = "<span style='opacity:0.5; font-size:0.8em;'>Analyzing vector space...</span>";

    const store = db.transaction(["bottles"]).objectStore("bottles");
    store.getAll().onsuccess = (e) => {
        const myBottles = e.target.result;
        
        // Filter for bottles you actually liked (Score 7+)
        const highRated = myBottles.filter(b => b.score >= 7);

        if(highRated.length < 2) {
            resultBox.innerHTML = "<span style='color:var(--hot); font-size:0.7em;'>Log 2+ highly rated bottles first.</span>";
            return;
        }

        // 1. Calculate target vector (your average palate based on likes)
        const target = {
            sweet: highRated.reduce((a,b) => a + b.sweet, 0) / highRated.length,
            oak: highRated.reduce((a,b) => a + b.oak, 0) / highRated.length,
            spice: highRated.reduce((a,b) => a + b.spice, 0) / highRated.length
        };

        // 2. Find bottles in DB you HAVEN'T logged yet
        const myBottleNames = myBottles.map(b => b.name.toLowerCase());
        const candidates = AI_DATABASE.filter(dbB => !myBottleNames.includes(dbB.name.toLowerCase()));

        if(candidates.length === 0) {
            resultBox.innerText = "You've tasted the whole list!";
            return;
        }

        // 3. Mathematical Matching (Euclidean Distance)
        // We find the candidate with the SMALLEST statistical difference from your target vector.
        let bestMatch = null;
        let minDistance = Infinity;

        candidates.forEach(cand => {
            const distance = Math.sqrt(
                Math.pow(cand.sweet - target.sweet, 2) +
                Math.pow(cand.oak - target.oak, 2) +
                Math.pow(cand.spice - target.spice, 2)
            );

            if (distance < minDistance) {
                minDistance = distance;
                bestMatch = cand;
            }
        });

        // 4. Display result
        setTimeout(() => {
            if(bestMatch) {
                resultBox.innerHTML = `
                    <div style="font-size:0.8em; color:var(--dim);">${bestMatch.distillery}</div>
                    <div style="color:var(--gold);">${bestMatch.name}</div>
                    <div style="font-size:0.65em; font-weight:normal; color:#aaa; margin-top:5px; font-style:italic;">Match Score: ${Math.max(0, (10 - minDistance * 2).toFixed(1))}/10</div>
                `;
            } else { resultBox.innerText = "No match found."; }
        }, 800);
    };
}
</script>
</body>
</html>
