<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bourbon Vault Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/931/931920.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #c3a36b; --gold-dim: #9a7f53; --bg: #000000; --card: #111111; --input: #1a1a1a; --text: #e0e0e0; --dim: #777; --hot: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: contain; }
        
        header { padding: 70px 20px 20px; text-align: center; background: linear-gradient(180deg, #111 0%, var(--bg) 100%); border-bottom: 1px solid #222; }
        h1 { color: var(--gold); margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }

        .tabs { display: flex; sticky: top; background: rgba(17,17,17,0.9); backdrop-filter: blur(10px); margin: 15px; border-radius: 12px; padding: 4px; border: 1px solid #222; z-index: 100; }
        .tabs button { flex: 1; padding: 12px; border: none; background: none; color: var(--dim); font-weight: bold; border-radius: 8px; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .tabs button.active { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; box-shadow: 0 4px 15px rgba(195, 163, 107, 0.3); }

        .content { padding: 0 15px; display: none; animation: fadeIn 0.4s ease; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: var(--input); color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .suggestion-box { background: #1a1a1a; border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; border: 1px solid var(--gold); position: absolute; width: calc(100% - 70px); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .suggestion-item { padding: 14px; border-bottom: 1px solid #333; font-size: 0.9em; color: var(--text); cursor: pointer; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; }
        .btn-dark { background: #222; color: var(--gold); border: 1px solid #333; }
        
        .stat-row { display: flex; justify-content: space-between; margin: 12px 0 4px; color: var(--gold); font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--gold); height: 6px; margin-bottom: 15px; }

        .photo-container { width: 100%; height: 150px; background: #1a1a1a; border-radius: 12px; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 0.8em; overflow: hidden; position: relative; margin: 10px 0; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        .vault-item { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; position: relative; border: 1px solid #222; }
        .item-header { display: flex; gap: 12px; align-items: center; }
        .item-photo-mini { width: 50px; height: 50px; border-radius: 8px; background: #222; object-fit: cover; border: 1px solid #333; }
        .vault-item h3 { margin: 0; color: var(--gold); font-size: 1.1em; }
        .tag { background: #1a1a1a; padding: 4px 8px; border-radius: 4px; font-size: 0.65em; font-weight: bold; color: var(--text); border: 1px solid #333; margin-right: 5px; }
        .delete-btn { color: #555; background: none; border: none; font-size: 0.7em; margin-top: 15px; text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <h1>Bourbon Vault Pro</h1>
</header>

<div class="tabs">
    <button class="t-btn active" onclick="openTab('log', this)">Log</button>
    <button class="t-btn" onclick="openTab('vault', this)">Vault</button>
    <button class="t-btn" onclick="openTab('stats', this)">Analytics</button>
</div>

<div id="log" class="content active">
    <div class="card">
        <input id="bName" placeholder="Find Bourbon..." oninput="showSuggestions(this.value)" autocomplete="off">
        <div id="suggestions" class="suggestion-box"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="bDistillery" placeholder="Distillery">
            <input id="bProof" placeholder="Proof">
        </div>

        <div class="photo-container" onclick="document.getElementById('photoInput').click()">
            <span id="photoPlaceholder">📷 Take Bottle Photo</span>
            <img id="photoPreview" style="display:none;">
        </div>
        <input type="file" id="photoInput" accept="image/*" capture="camera" onchange="handlePhoto(this)" style="display:none;">
        
        <div class="stat-row"><span>Sweetness</span><span id="v1">3</span></div>
        <input type="range" id="s1" min="1" max="5" value="3" oninput="v1.innerText=this.value">
        
        <div class="stat-row"><span>Oak / Wood</span><span id="v2">3</span></div>
        <input type="range" id="s2" min="1" max="5" value="3" oninput="v2.innerText=this.value">
        
        <div class="stat-row"><span>Spice / Heat</span><span id="v3">3</span></div>
        <input type="range" id="s3" min="1" max="5" value="3" oninput="v3.innerText=this.value">

        <input id="bScore" type="number" placeholder="Your Rating (1-10)">
        <textarea id="bNotes" placeholder="Personal tasting notes..."></textarea>
        
        <button class="btn btn-gold" onclick="saveBourbon()">Add to Vault</button>
    </div>
</div>

<div id="vault" class="content">
    <div id="vaultList"></div>
</div>

<div id="stats" class="content">
    <div class="card" style="border: 2px solid var(--gold);">
        <h3 style="color:var(--gold); margin:0; font-size:0.9em; text-transform:uppercase;">Recommendation</h3>
        <div id="recoResult" style="margin:15px 0; font-weight:bold; font-size:1.1em; min-height:40px;">Log more bottles to get a match!</div>
        <button class="btn btn-dark" onclick="getRecommendation()">Get Recommendation</button>
    </div>
    <div class="card">
        <canvas id="palateChart"></canvas>
    </div>
</div>

<script>
// --- EXPANDED AI DATABASE ---
const AI_DATABASE = [
    { name: "Noah's Mill", distillery: "Willett", proof: 114.3, sweet: 3, oak: 4, spice: 5, notes: "Walnut, prune, heavy spice." },
    { name: "Rowan's Creek", distillery: "Willett", proof: 100.1, sweet: 4, oak: 3, spice: 3, notes: "Caramel, pear, herbal mint." },
    { name: "Four Roses Single Barrel", distillery: "Four Roses", proof: 100, sweet: 2, oak: 3, spice: 5, notes: "Plum, floral, high-rye spice." },
    { name: "Four Roses Small Batch", distillery: "Four Roses", proof: 90, sweet: 4, oak: 2, spice: 3, notes: "Mellow fruit, caramel, and oak." },
    { name: "Four Roses Small Batch Select", distillery: "Four Roses", proof: 104, sweet: 3, oak: 3, spice: 4, notes: "Dark berries, spearmint, oak." },
    { name: "Weller Antique 107", distillery: "Buffalo Trace", proof: 107, sweet: 5, oak: 3, spice: 3, notes: "Cinnamon, vanilla, wheated bold heat." },
    { name: "Weller Special Reserve", distillery: "Buffalo Trace", proof: 90, sweet: 5, oak: 2, spice: 2, notes: "Butterscotch, soft honey." },
    { name: "Stagg", distillery: "Buffalo Trace", proof: 130.2, sweet: 4, oak: 4, spice: 5, notes: "Chocolate, dark cherry, massive heat." },
    { name: "Eagle Rare 10", distillery: "Buffalo Trace", proof: 90, sweet: 3, oak: 4, spice: 3, notes: "Complex herbs, honey, leather." },
    { name: "Old Forester 1910", distillery: "Old Forester", proof: 93, sweet: 5, oak: 4, spice: 2, notes: "Double oaked, toasted marshmallow." },
    { name: "Old Forester 1920", distillery: "Old Forester", proof: 115, sweet: 4, oak: 3, spice: 4, notes: "Dark chocolate, cherry, nuttiness." },
    { name: "Elijah Craig Barrel Proof", distillery: "Heaven Hill", proof: 120, sweet: 3, oak: 5, spice: 4, notes: "Deep molasses, black pepper." },
    { name: "Wild Turkey Rare Breed", distillery: "Wild Turkey", proof: 116.8, sweet: 3, oak: 4, spice: 5, notes: "Honey, orange, complex spice." },
    { name: "Michter's US*1 Small Batch", distillery: "Michter's", proof: 91.4, sweet: 4, oak: 3, spice: 2, notes: "Caramelized sugar, stone fruit." },
    { name: "Blanton's", distillery: "Buffalo Trace", proof: 93, sweet: 4, oak: 3, spice: 4, notes: "Citrus, oak, light vanilla." },
    { name: "Buffalo Trace", distillery: "Buffalo Trace", proof: 90, sweet: 4, oak: 3, spice: 2, notes: "Vanilla, caramel, mint hint." },
    { name: "Knob Creek 9", distillery: "Jim Beam", proof: 100, sweet: 3, oak: 5, spice: 3, notes: "Charred oak, toasted nuts." },
    { name: "Basil Hayden", distillery: "Jim Beam", proof: 80, sweet: 4, oak: 2, spice: 3, notes: "Light, spicy, easy drinker." },
    { name: "Booker's", distillery: "Jim Beam", proof: 126, sweet: 3, oak: 5, spice: 4, notes: "Vanilla, peanut, intense wood." },
    { name: "Woodford Reserve", distillery: "Woodford", proof: 90, sweet: 3, oak: 3, spice: 3, notes: "Dried fruit, cocoa, spices." }
];

// --- DB & Logic ---
let db;
const req = indexedDB.open("BourbonVaultDB", 1);
req.onupgradeneeded = e => e.target.result.createObjectStore("bottles", { keyPath: "id" });
req.onsuccess = e => { db = e.target.result; renderVault(); };

function openTab(id, btn) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if(id === 'stats') renderStats();
}

// BUG FIX: Safer autocomplete selection using an index instead of string name
function showSuggestions(input) {
    const box = document.getElementById("suggestions");
    if (input.length < 2) { box.style.display = "none"; return; }
    const matches = AI_DATABASE.filter(b => b.name.toLowerCase().includes(input.toLowerCase()));
    if (matches.length > 0) {
        box.innerHTML = matches.map((m, idx) => {
            // Find real index in AI_DATABASE to avoid apostrophe issues in JS strings
            const realIndex = AI_DATABASE.findIndex(dbItem => dbItem.name === m.name);
            return `<div class="suggestion-item" onclick="selectBourbon(${realIndex})">${m.name}</div>`;
        }).join('');
        box.style.display = "block";
    } else { box.style.display = "none"; }
}

function selectBourbon(index) {
    const b = AI_DATABASE[index];
    document.getElementById("bName").value = b.name;
    document.getElementById("bDistillery").value = b.distillery;
    document.getElementById("bProof").value = b.proof;
    document.getElementById("s1").value = b.sweet; v1.innerText = b.sweet;
    document.getElementById("s2").value = b.oak; v2.innerText = b.oak;
    document.getElementById("s3").value = b.spice; v3.innerText = b.spice;
    document.getElementById("bNotes").value = "AI Notes: " + b.notes;
    document.getElementById("suggestions").style.display = "none";
}

let currentPhoto = null;
function handlePhoto(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
        currentPhoto = e.target.result;
        document.getElementById('photoPreview').src = currentPhoto;
        document.getElementById('photoPreview').style.display = "block";
        document.getElementById('photoPlaceholder').style.display = "none";
    };
    reader.readAsDataURL(file);
}

function saveBourbon() {
    const entry = {
        name: document.getElementById("bName").value,
        dist: document.getElementById("bDistillery").value,
        proof: Number(document.getElementById("bProof").value),
        sweet: Number(document.getElementById("s1").value),
        oak: Number(document.getElementById("s2").value),
        spice: Number(document.getElementById("s3").value),
        score: Number(document.getElementById("bScore").value),
        notes: document.getElementById("bNotes").value,
        photo: currentPhoto,
        id: Date.now()
    };
    if(!entry.name) return;
    const tx = db.transaction("bottles", "readwrite");
    tx.objectStore("bottles").add(entry);
    tx.onsuccess = () => location.reload();
}

function renderVault() {
    const store = db.transaction("bottles").objectStore("bottles");
    store.getAll().onsuccess = e => {
        const bottles = e.target.result;
        document.getElementById("vaultList").innerHTML = bottles.map(b => `
            <div class="vault-item">
                <div class="item-header">
                    <img src="${b.photo || ''}" class="item-photo-mini" style="${!b.photo ? 'display:none' : ''}">
                    <div><h3>${b.name}</h3><div style="font-size:0.7em; opacity:0.6">${b.dist}</div></div>
                </div>
                <div style="margin:10px 0;"><span class="tag">${b.proof} Proof</span><span class="tag">Score: ${b.score}/10</span></div>
                <p style="font-size:0.8em; color:var(--dim)">${b.notes}</p>
                <button class="delete-btn" onclick="deleteEntry(${b.id})">Delete</button>
            </div>
        `).reverse().join('');
    };
}

function deleteEntry(id) {
    const tx = db.transaction("bottles", "readwrite");
    tx.objectStore("bottles").delete(id);
    tx.onsuccess = () => renderVault();
}

function getRecommendation() {
    const store = db.transaction("bottles").objectStore("bottles");
    store.getAll().onsuccess = e => {
        const my = e.target.result;
        if(my.length < 2) return;
        const avg = {
            s: my.reduce((a,b)=>a+b.sweet,0)/my.length,
            o: my.reduce((a,b)=>a+b.oak,0)/my.length,
            sp: my.reduce((a,b)=>a+b.spice,0)/my.length
        };
        const myNames = my.map(x=>x.name.toLowerCase());
        const pool = AI_DATABASE.filter(x=> !myNames.includes(x.name.toLowerCase()));
        let best = pool[0];
        let min = 100;
        pool.forEach(p => {
            const d = Math.abs(p.sweet-avg.s) + Math.abs(p.oak-avg.o) + Math.abs(p.spice-avg.sp);
            if(d < min) { min = d; best = p; }
        });
        document.getElementById("recoResult").innerHTML = `Recommended: <span style="color:var(--gold)">${best.name}</span><br><small style="font-weight:normal; opacity:0.7">${best.distillery}</small>`;
    };
}
</script>
</body>
</html>
