<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bourbon Vault Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/931/931920.png">
    
    <style>
        :root { --gold: #c3a36b; --gold-dim: #9a7f53; --bg: #000000; --card: #111111; --input: #1a1a1a; --text: #e0e0e0; --dim: #777; --hot: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: env(safe-area-inset-bottom); overscroll-behavior-y: contain; }
        
        header { padding: 60px 20px 20px; text-align: center; background: linear-gradient(180deg, #111 0%, var(--bg) 100%); border-bottom: 1px solid #222; }
        h1 { color: var(--gold); margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }

        .tabs { display: flex; position: sticky; top: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); margin: 15px; border-radius: 12px; padding: 4px; border: 1px solid #222; z-index: 100; }
        .tabs button { flex: 1; padding: 12px; border: none; background: none; color: var(--dim); font-weight: bold; border-radius: 8px; font-size: 0.75em; text-transform: uppercase; }
        .tabs button.active { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; box-shadow: 0 4px 15px rgba(195, 163, 107, 0.3); }

        .content { padding: 0 15px; display: none; }
        .content.active { display: block; }

        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: var(--input); color: white; font-size: 16px; box-sizing: border-box; outline: none; -webkit-appearance: none; }
        
        .suggestion-box { background: #1a1a1a; border-radius: 8px; max-height: 300px; overflow-y: auto; display: none; border: 1px solid var(--gold); position: absolute; width: 100%; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,1); }
        .suggestion-item { padding: 14px; border-bottom: 1px solid #333; font-size: 0.9em; color: var(--text); display: flex; justify-content: space-between; align-items: center; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; font-size: 0.9em; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-gold { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); color: black; }

        .vault-item { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #222; }
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0 4px; color: var(--gold); font-size: 0.8em; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--gold); height: 6px; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 24px; border-radius: 50px; font-weight: bold; display: none; z-index: 3000; }
    </style>
</head>
<body>

<header><h1>Bourbon Vault Pro</h1></header>

<div class="tabs">
    <button class="t-btn active" onclick="openTab('log', this)">Log Bottle</button>
    <button class="t-btn" onclick="openTab('vault', this)">My Vault</button>
</div>

<div id="log" class="content active">
    <div class="card">
        <label style="font-size: 0.7em; color: var(--gold); text-transform: uppercase; letter-spacing: 1px;">Smart Search</label>
        <div style="position:relative;">
            <input id="bName" placeholder="Type bottle name (e.g. Blanton's)..." oninput="handleSearch(this.value)" onblur="hideSuggestions()" autocomplete="off">
            <div id="suggestions" class="suggestion-box"></div>
        </div>

        <input id="bDistillery" placeholder="Distillery">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="bProof" type="number" step="0.1" placeholder="Proof">
            <input id="bPrice" type="number" placeholder="Price $">
        </div>

        <div onclick="document.getElementById('photoInput').click()" style="height:100px; background:#1a1a1a; border-radius:12px; border:1px dashed #444; display:flex; align-items:center; justify-content:center; color:var(--dim); overflow:hidden; margin:10px 0;">
            <span id="photoPlaceholder">📷 Add Photo</span>
            <img id="photoPreview" style="display:none; width:100%; height:100%; object-fit:cover;">
        </div>
        <input type="file" id="photoInput" accept="image/*" capture="camera" onchange="handlePhoto(this)" style="display:none;">
        
        <div class="stat-row"><span>Sweetness</span><span id="v1">3</span></div>
        <input type="range" id="s1" min="1" max="5" value="3" oninput="v1.innerText=this.value">
        
        <div class="stat-row"><span>Oak</span><span id="v2">3</span></div>
        <input type="range" id="s2" min="1" max="5" value="3" oninput="v2.innerText=this.value">
        
        <div class="stat-row"><span>Spice</span><span id="v3">3</span></div>
        <input type="range" id="s3" min="1" max="5" value="3" oninput="v3.innerText=this.value">

        <input id="bScore" type="number" placeholder="Rating (1-10)">
        <textarea id="bNotes" placeholder="Tasting notes..."></textarea>
        
        <button class="btn btn-gold" onclick="saveBourbon()">Save to Collection</button>
    </div>
</div>

<div id="vault" class="content">
    <input id="vaultSearch" placeholder="Search your vault..." oninput="renderVault(this.value)">
    <div id="vaultList"></div>
</div>

<div id="toast" class="toast">Added!</div>

<script>

    { name: "Bardstown Origin Series", dist: "Bardstown", proof: 96, sweet: 4, oak: 3, spice: 3, notes: "Apricot, honey, oak." },
    { name: "Penelope Barrel Strength", dist: "Penelope", proof: 115, sweet: 4, oak: 2, spice: 4, notes: "Butterscotch, marshmallow, spice." },
    { name: "New Riff Bottled in Bond", dist: "New Riff", proof: 100, sweet: 3, oak: 3, spice: 4, notes: "Clove, black pepper, vanilla." },
    { name: "Angels Envy", dist: "Angels Envy", proof: 86.6, sweet: 5, oak: 2, spice: 1, notes: "Port wine finish, raisin, syrup." }

];

// Add logic to auto-complete the rest based on name patterns if specific entry missing
let db;
const request = indexedDB.open("BourbonVault_Final_V3", 1);
request.onupgradeneeded = e => { e.target.result.createObjectStore("bottles", { keyPath: "id" }); };
request.onsuccess = e => { db = e.target.result; renderVault(); };

function handleSearch(query) {
    const box = document.getElementById("suggestions");
    if (query.length < 2) { box.style.display = "none"; return; }

    const matches = ELITE_DATABASE.filter(b => b.name.toLowerCase().includes(query.toLowerCase()));
    
    if (matches.length) {
        box.innerHTML = matches.slice(0, 15).map(m => `
            <div class="suggestion-item" onpointerdown="applyLocal(${ELITE_DATABASE.indexOf(m)})">
                <span>⭐ ${m.name}</span> <small style="color:var(--dim)">${m.dist}</small>
            </div>
        `).join('');
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

function applyLocal(idx) {
    const b = ELITE_DATABASE[idx];
    document.getElementById('bName').value = b.name;
    document.getElementById('bDistillery').value = b.dist;
    document.getElementById('bProof').value = b.proof;
    document.getElementById('s1').value = b.sweet; v1.innerText = b.sweet;
    document.getElementById('s2').value = b.oak; v2.innerText = b.oak;
    document.getElementById('s3').value = b.spice; v3.innerText = b.spice;
    document.getElementById('bNotes').value = b.notes;
    hideSuggestions();
}

function hideSuggestions() { setTimeout(() => { document.getElementById("suggestions").style.display = "none"; }, 300); }

function saveBourbon() {
    const name = document.getElementById("bName").value;
    if (!name) return;
    const entry = {
        id: Date.now(),
        name: name,
        dist: document.getElementById("bDistillery").value,
        proof: document.getElementById("bProof").value,
        price: document.getElementById("bPrice").value,
        sweet: Number(document.getElementById("s1").value),
        oak: Number(document.getElementById("s2").value),
        spice: Number(document.getElementById("s3").value),
        score: document.getElementById("bScore").value,
        notes: document.getElementById("bNotes").value,
        photo: currentPhoto
    };
    db.transaction("bottles", "readwrite").objectStore("bottles").add(entry).onsuccess = () => {
        showToast(); clearForm(); renderVault();
    };
}

function renderVault(filter = "") {
    if (!db) return;
    const store = db.transaction("bottles").objectStore("bottles");
    store.getAll().onsuccess = e => {
        const bottles = e.target.result;
        const list = document.getElementById("vaultList");
        const filtered = bottles.filter(b => b.name.toLowerCase().includes(filter.toLowerCase()));
        list.innerHTML = filtered.map(b => `
            <div class="vault-item">
                <div style="display:flex; gap:12px; align-items:center;">
                    <img src="${b.photo || 'https://cdn-icons-png.flaticon.com/512/931/931920.png'}" style="width:55px; height:55px; border-radius:10px; object-fit:cover;">
                    <div><h3 style="margin:0; color:var(--gold); font-size:1.1em;">${b.name}</h3><small style="opacity:0.6">${b.dist} • ${b.proof} Proof</small></div>
                </div>
                <div style="margin:10px 0; font-size:0.85em; color:#bbb;">${b.notes.substring(0, 60)}${b.notes.length > 60 ? '...' : ''}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #222; padding-top:10px; margin-top:10px;">
                    <span style="color:var(--gold); font-weight:bold;">${b.score}/10</span>
                    <button onclick="deleteBottle(${b.id})" style="background:none; border:none; color:var(--hot); font-size:0.7em; text-decoration:underline;">Delete</button>
                </div>
            </div>
        `).reverse().join('');
    };
}

function deleteBottle(id) { if (confirm("Delete this bottle?")) db.transaction("bottles", "readwrite").objectStore("bottles").delete(id).onsuccess = () => renderVault(); }

let currentPhoto = null;
function handlePhoto(input) {
    const reader = new FileReader();
    reader.onload = e => { 
        currentPhoto = e.target.result; 
        document.getElementById('photoPreview').src = currentPhoto;
        document.getElementById('photoPreview').style.display = "block";
        document.getElementById('photoPlaceholder').style.display = "none";
    };
    reader.readAsDataURL(input.files[0]);
}
function showToast() { document.getElementById("toast").style.display = "block"; setTimeout(() => { document.getElementById("toast").style.display = "none"; }, 2000); }
function clearForm() { 
    document.querySelectorAll('input, textarea').forEach(i => i.value = ""); 
    document.getElementById('photoPreview').style.display = "none"; 
    document.getElementById('photoPlaceholder').style.display = "block"; 
    currentPhoto = null; 
}
function openTab(id, btn) { 
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active')); 
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
    btn.classList.add('active'); 
}
</script>
</body>
</html>
